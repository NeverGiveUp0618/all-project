<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#05070f">
<title>五术堂 · 命理导航</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='44' fill='none' stroke='%23d9b877' stroke-width='5'/><circle cx='50' cy='50' r='10' fill='%23d9b877'/></svg>">
<style>
  :root{
    --bg0:#05070f; --bg1:#0a1020;
    --gold:#d9b877; --gold-hi:#f4e6be; --gold-lo:#9a7d43;
    --cyan:#8fd3e0; --cyan-dim:#4d7b88;
    --ink:#e9edf8; --ink-dim:#8a94ac;
    --line:rgba(217,184,119,.26);
    --panel:rgba(14,20,36,.55);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh; position:relative; overflow-x:hidden;
    background:
      radial-gradient(90% 55% at 22% 12%, rgba(80,120,160,.16), transparent 60%),
      radial-gradient(80% 55% at 82% 30%, rgba(110,86,160,.14), transparent 60%),
      radial-gradient(120% 90% at 50% 8%, #101a30 0%, #0a1020 42%, var(--bg0) 100%);
    color:var(--ink);
    font-family:"Noto Serif SC","Songti SC","PingFang SC",serif;
    display:flex; flex-direction:column; align-items:center;
    padding:calc(env(safe-area-inset-top) + 44px) 22px calc(env(safe-area-inset-bottom) + 42px);
  }
  /* 星空层 */
  #stars,#stars2{position:fixed; inset:0; z-index:0; pointer-events:none;}
  .star{position:absolute; border-radius:50%; background:#dfe8ff;}
  @keyframes tw{0%,100%{opacity:.25}50%{opacity:1}}
  .wrap{position:relative; z-index:2; width:100%; display:flex; flex-direction:column; align-items:center;}

  /* 罗盘主视觉 */
  .hero{position:relative; width:210px; height:210px; margin:6px 0 6px; opacity:0; animation:fade 1s .1s ease forwards;}
  .compass{position:absolute; inset:0; color:var(--gold);}
  .compass.spin{animation:spin 120s linear infinite;}
  .compass.spin-r{animation:spin 90s linear infinite reverse;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .core{
    position:absolute; inset:0; display:grid; place-items:center; flex-direction:column;
  }
  .core .tj{font-size:34px; color:var(--gold-hi); text-shadow:0 0 18px rgba(217,184,119,.6); line-height:1;}
  .glow{position:absolute; inset:-30% ; border-radius:50%;
    background:radial-gradient(circle, rgba(217,184,119,.14), transparent 62%); z-index:-1;}

  /* 标题 */
  .head{text-align:center; margin:10px 0 34px; opacity:0; animation:fade 1s .35s ease forwards;}
  h1{
    font-size:33px; letter-spacing:.46em; font-weight:700; margin:0 0 12px; padding-left:.46em;
    background:linear-gradient(100deg,var(--gold-lo),var(--gold-hi) 42%,#fff8e6 50%,var(--gold-hi) 58%,var(--gold-lo));
    background-size:220% 100%;
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    animation:sheen 7s ease-in-out infinite;
  }
  @keyframes sheen{0%,100%{background-position:0 0}50%{background-position:100% 0}}
  .sub{display:flex; align-items:center; justify-content:center; gap:13px;
    font-size:12px; letter-spacing:.4em; color:var(--cyan); opacity:.85; margin:0; padding-left:.4em;}
  .sub::before,.sub::after{content:""; width:30px; height:1px; background:linear-gradient(90deg,transparent,var(--cyan-dim),transparent);}

  /* 卡片 */
  .grid{width:100%; max-width:452px; display:flex; flex-direction:column; gap:14px;}
  .card{
    display:flex; align-items:center; gap:16px; padding:17px 19px;
    background:var(--panel);
    -webkit-backdrop-filter:blur(14px); backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,.07); border-radius:16px;
    color:var(--ink); text-decoration:none; position:relative; overflow:hidden;
    box-shadow:0 6px 26px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.05);
    opacity:0; transform:translateY(16px); animation:rise .7s ease forwards;
    transition:transform .2s ease, border-color .25s, box-shadow .25s;
  }
  .card::before{content:""; position:absolute; left:0; top:0; bottom:0; width:3px;
    background:linear-gradient(var(--cyan),var(--gold)); opacity:.9;}
  .card:nth-child(1){animation-delay:.5s}.card:nth-child(2){animation-delay:.58s}
  .card:nth-child(3){animation-delay:.66s}.card:nth-child(4){animation-delay:.74s}
  .card:nth-child(5){animation-delay:.82s}
  .card:active{transform:scale(.985);}
  .card:hover{border-color:rgba(217,184,119,.5);
    box-shadow:0 12px 38px rgba(0,0,0,.55), 0 0 0 1px rgba(217,184,119,.14);
    transform:translateY(-2px);}
  .ic{
    flex:0 0 50px; height:50px; border-radius:12px; display:grid; place-items:center;
    font-size:24px; font-weight:600; color:var(--gold-hi);
    background:radial-gradient(circle at 32% 26%, #1c2740, #0c1322);
    border:1px solid var(--line);
    box-shadow:inset 0 -3px 8px rgba(0,0,0,.4);
  }
  .txt{flex:1; min-width:0;}
  .t-main{font-size:18px; font-weight:600; letter-spacing:.1em;}
  .t-sub{font-size:12px; color:var(--ink-dim); margin-top:4px; letter-spacing:.04em;}
  .no{font:600 12px/1 "PingFang SC",sans-serif; color:var(--cyan-dim); letter-spacing:.1em; flex:0 0 auto;}
  .arrow{color:var(--gold); font-size:21px; opacity:.5; flex:0 0 auto; transition:transform .2s,opacity .2s;}
  .card:hover .arrow{opacity:1; transform:translateX(3px);}

  .foot{margin-top:40px; font-size:10.5px; letter-spacing:.24em; color:rgba(138,148,172,.5); text-align:center;
    opacity:0; animation:fade 1s 1s ease forwards;}
  @keyframes fade{to{opacity:1;}}
  @keyframes rise{to{opacity:1; transform:none;}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;} .hero,.head,.card,.foot{opacity:1;transform:none;}}
  @media (min-width:600px){ .grid{max-width:540px;} .hero{width:240px;height:240px;} }
</style>
</head>
<body>
  <div id="stars"></div>
  <div id="stars2"></div>

  <div class="wrap">
    <div class="hero">
      <div class="glow"></div>
      <svg class="compass spin" id="ring-out" viewBox="0 0 200 200" fill="none"></svg>
      <svg class="compass spin-r" id="ring-in" viewBox="0 0 200 200" fill="none"></svg>
      <div class="core"><div class="tj">&#9775;</div></div>
    </div>

    <div class="head">
      <h1>五术堂</h1>
      <p class="sub">命 理 · 一 门 五 术</p>
    </div>

    <main class="grid">
      <a class="card" href="view.html?app=bazi">
        <div class="ic">卦</div>
        <div class="txt"><div class="t-main">八字日练</div><div class="t-sub">五模式练习 · 学习计划</div></div>
        <span class="no">壹</span><span class="arrow">&#8250;</span>
      </a>
      <a class="card" href="view.html?app=xiangfa">
        <div class="ic">象</div>
        <div class="txt"><div class="t-main">八字象义</div><div class="t-sub">象义图谱 · 查共象 · 刷卡</div></div>
        <span class="no">贰</span><span class="arrow">&#8250;</span>
      </a>
      <a class="card" href="view.html?app=liuren">
        <div class="ic">壬</div>
        <div class="txt"><div class="t-main">大六壬</div><div class="t-sub">起课 · 九宗门 · 毕法速查</div></div>
        <span class="no">叁</span><span class="arrow">&#8250;</span>
      </a>
      <a class="card" href="view.html?app=zeri">
        <div class="ic">日</div>
        <div class="txt"><div class="t-main">择日学习</div><div class="t-sub">查 · 算 · 学 三模式</div></div>
        <span class="no">肆</span><span class="arrow">&#8250;</span>
      </a>
      <a class="card" href="view.html?app=yangong">
        <div class="ic">山</div>
        <div class="txt"><div class="t-main">杨公背诵</div><div class="t-sub">五书口诀 · 易学图谱</div></div>
        <span class="no">伍</span><span class="arrow">&#8250;</span>
      </a>
    </main>

    <div class="foot">堪 舆 定 盘 &nbsp;·&nbsp; 择 术 而 入 &nbsp;·&nbsp; 可 添 加 到 主 屏</div>
  </div>

<script>
// —— 星空 ——
(function(){
  function field(el,n,maxr,tw){
    var h="";
    for(var i=0;i<n;i++){
      var s=(Math.random()*maxr+0.4).toFixed(2);
      var x=(Math.random()*100).toFixed(2), y=(Math.random()*100).toFixed(2);
      var o=(Math.random()*0.6+0.2).toFixed(2);
      var t=tw?(" animation:tw "+(Math.random()*4+2.5).toFixed(1)+"s ease-in-out "+(Math.random()*4).toFixed(1)+"s infinite;"):"";
      h+='<span class="star" style="width:'+s+'px;height:'+s+'px;left:'+x+'%;top:'+y+'%;opacity:'+o+';'+t+'"></span>';
    }
    el.innerHTML=h;
  }
  field(document.getElementById('stars'),90,1.6,true);
  field(document.getElementById('stars2'),50,1.0,false);
})();

// —— 罗盘 ——
(function(){
  var NS="http://www.w3.org/2000/svg", C=100;
  function pt(cx,cy,r,deg){var a=(deg-90)*Math.PI/180;return[cx+r*Math.cos(a),cy+r*Math.sin(a)];}
  // 外环:24山刻度 + 双圈
  var out='';
  out+='<circle cx="100" cy="100" r="94" stroke="currentColor" stroke-opacity=".55" stroke-width="1"/>';
  out+='<circle cx="100" cy="100" r="80" stroke="currentColor" stroke-opacity=".3" stroke-width="1"/>';
  for(var i=0;i<24;i++){
    var deg=i*15, major=(i%3===0);
    var r1=94, r2=major?80:86;
    var a=(deg-90)*Math.PI/180;
    out+='<line x1="'+(100+r1*Math.cos(a)).toFixed(1)+'" y1="'+(100+r1*Math.sin(a)).toFixed(1)+'" x2="'+(100+r2*Math.cos(a)).toFixed(1)+'" y2="'+(100+r2*Math.sin(a)).toFixed(1)+'" stroke="currentColor" stroke-opacity="'+(major?'.85':'.4')+'" stroke-width="'+(major?1.4:0.8)+'"/>';
  }
  document.getElementById('ring-out').innerHTML=out;
  // 内环:八卦 + 圈
  var trig=['☰','☱','☲','☳','☴','☵','☶','☷'];
  var inn='';
  inn+='<circle cx="100" cy="100" r="64" stroke="#8fd3e0" stroke-opacity=".35" stroke-width="1"/>';
  inn+='<circle cx="100" cy="100" r="44" stroke="currentColor" stroke-opacity=".35" stroke-width="1"/>';
  for(var k=0;k<8;k++){
    var d=k*45, a2=(d-90)*Math.PI/180, rr=54;
    var x=(100+rr*Math.cos(a2)), y=(100+rr*Math.sin(a2));
    inn+='<text x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" fill="#8fd3e0" fill-opacity=".8" font-size="11" text-anchor="middle" dominant-baseline="central">'+trig[k]+'</text>';
  }
  document.getElementById('ring-in').innerHTML=inn;
})();

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').then(function(reg){ reg.update(); }).catch(function(){});
  var _refreshed=false;
  navigator.serviceWorker.addEventListener('controllerchange', function(){
    if(_refreshed) return; _refreshed=true; location.reload();
  });
}
</script>
</body>
</html>
