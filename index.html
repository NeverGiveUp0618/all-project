<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0b0a">
<title>命理学习 · 五术堂</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#9775;</text></svg>">
<style>
  :root{
    --bg:#0d0b0a;
    --gold:#c9a75f; --gold-hi:#f0d9a0; --gold-lo:#8f7238;
    --ink:#efe7d6; --ink-dim:#9c917d;
    --line:rgba(201,167,95,.28);
    --glass:rgba(38,32,25,.55);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh; position:relative; overflow-x:hidden;
    background:
      radial-gradient(140% 90% at 50% -20%, #241c12 0%, #14100c 46%, var(--bg) 100%);
    color:var(--ink);
    font-family:"Noto Serif SC","Songti SC","PingFang SC",serif;
    display:flex; flex-direction:column; align-items:center;
    padding:calc(env(safe-area-inset-top) + 54px) 22px calc(env(safe-area-inset-bottom) + 40px);
  }
  /* 八卦环水印 */
  .ring{
    position:fixed; top:-18vh; left:50%; width:min(120vw,760px); aspect-ratio:1;
    transform:translateX(-50%); pointer-events:none; z-index:0;
    opacity:.10; color:var(--gold);
    animation:spin 90s linear infinite;
  }
  @keyframes spin{to{transform:translateX(-50%) rotate(360deg);}}
  .wrap{position:relative; z-index:1; width:100%; display:flex; flex-direction:column; align-items:center;}

  /* 标题 */
  .head{text-align:center; margin-bottom:42px; opacity:0; animation:rise .9s .05s ease forwards;}
  .seal{
    width:66px; height:66px; margin:0 auto 20px; border-radius:50%;
    display:grid; place-items:center; font-size:34px; color:var(--bg);
    background:radial-gradient(circle at 35% 30%, var(--gold-hi), var(--gold) 55%, var(--gold-lo));
    box-shadow:0 0 0 1px rgba(240,217,160,.4), 0 8px 30px rgba(201,167,95,.28), inset 0 -3px 8px rgba(0,0,0,.35);
  }
  h1{
    font-size:30px; letter-spacing:.42em; font-weight:700; margin:0 0 14px; padding-left:.42em;
    background:linear-gradient(100deg, var(--gold-lo), var(--gold-hi) 40%, #fff5df 50%, var(--gold-hi) 60%, var(--gold-lo));
    background-size:220% 100%;
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    animation:sheen 6s ease-in-out infinite;
  }
  @keyframes sheen{0%,100%{background-position:0% 0}50%{background-position:100% 0}}
  .sub{
    display:flex; align-items:center; justify-content:center; gap:14px;
    font-size:12.5px; letter-spacing:.36em; color:var(--ink-dim); margin:0; padding-left:.36em;
  }
  .sub::before,.sub::after{content:""; width:34px; height:1px; background:linear-gradient(90deg,transparent,var(--line),transparent);}

  /* 卡片 */
  .grid{width:100%; max-width:460px; display:flex; flex-direction:column; gap:15px;}
  .card{
    display:flex; align-items:center; gap:17px; padding:19px 20px;
    background:var(--glass);
    -webkit-backdrop-filter:blur(12px); backdrop-filter:blur(12px);
    border:1px solid var(--line); border-radius:18px;
    color:var(--ink); text-decoration:none; position:relative; overflow:hidden;
    box-shadow:0 4px 22px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,240,210,.05);
    opacity:0; transform:translateY(14px);
    animation:rise .7s ease forwards;
    transition:transform .18s ease, border-color .25s, box-shadow .25s;
  }
  .card:nth-child(1){animation-delay:.12s}
  .card:nth-child(2){animation-delay:.20s}
  .card:nth-child(3){animation-delay:.28s}
  .card:nth-child(4){animation-delay:.36s}
  .card:nth-child(5){animation-delay:.44s}
  .card:active{transform:scale(.98);}
  .card:hover{
    border-color:rgba(240,217,160,.6);
    box-shadow:0 10px 34px rgba(0,0,0,.5), 0 0 0 1px rgba(240,217,160,.15), inset 0 1px 0 rgba(255,240,210,.08);
    transform:translateY(-2px);
  }
  .card::after{ /* 顶部流光 */
    content:""; position:absolute; inset:0; border-radius:18px; pointer-events:none;
    background:linear-gradient(120deg,transparent 40%,rgba(240,217,160,.08) 50%,transparent 60%);
    opacity:0; transition:opacity .3s;
  }
  .card:hover::after{opacity:1;}
  .ic{
    flex:0 0 54px; height:54px; border-radius:50%;
    display:grid; place-items:center; font-size:26px; font-weight:600;
    color:var(--gold-hi);
    background:radial-gradient(circle at 34% 28%, #3a3021, #211a12);
    border:1px solid var(--line);
    box-shadow:inset 0 -3px 8px rgba(0,0,0,.4);
  }
  .txt{flex:1; min-width:0;}
  .t-main{font-size:18.5px; font-weight:600; letter-spacing:.1em; color:var(--ink);}
  .t-sub{font-size:12.5px; color:var(--ink-dim); margin-top:4px; letter-spacing:.05em;}
  .arrow{color:var(--gold); font-size:22px; opacity:.55; flex:0 0 auto; transition:transform .2s,opacity .2s;}
  .card:hover .arrow{opacity:1; transform:translateX(3px);}

  .foot{
    margin-top:44px; font-size:11px; letter-spacing:.2em; color:rgba(156,145,125,.5); text-align:center;
    opacity:0; animation:rise .8s .6s ease forwards;
  }
  @keyframes rise{to{opacity:1; transform:none;}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;} .head,.card,.foot{opacity:1;transform:none;}}
  @media (min-width:600px){ .grid{max-width:540px;} }
</style>
</head>
<body>
  <svg class="ring" viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="1">
    <circle cx="100" cy="100" r="96"/><circle cx="100" cy="100" r="74"/><circle cx="100" cy="100" r="52"/>
    <g stroke-width="1.4">
      <!-- 八卦刻度 -->
      <g id="tick"><line x1="100" y1="4" x2="100" y2="22"/></g>
    </g>
    <g stroke-width="1">
      <line x1="100" y1="0" x2="100" y2="200"/><line x1="0" y1="100" x2="200" y2="100"/>
      <line x1="29" y1="29" x2="171" y2="171"/><line x1="171" y1="29" x2="29" y2="171"/>
    </g>
  </svg>

  <div class="wrap">
    <div class="head">
      <div class="seal">&#9775;</div>
      <h1>五术堂</h1>
      <p class="sub">命 理 · 择 术 而 入</p>
    </div>

    <main class="grid">
      <a class="card" href="https://nevergiveup0618.github.io/bazi-game/">
        <div class="ic">卦</div>
        <div class="txt"><div class="t-main">八字日练</div><div class="t-sub">五模式练习 · 学习计划系统</div></div>
        <span class="arrow">&#8250;</span>
      </a>
      <a class="card" href="https://nevergiveup0618.github.io/bazi-xiangfa/">
        <div class="ic">象</div>
        <div class="txt"><div class="t-main">八字象义</div><div class="t-sub">象义图谱 · 查共象 · 刷卡</div></div>
        <span class="arrow">&#8250;</span>
      </a>
      <a class="card" href="https://nevergiveup0618.github.io/liuren-game/">
        <div class="ic">壬</div>
        <div class="txt"><div class="t-main">大六壬</div><div class="t-sub">起课 · 九宗门 · 毕法速查</div></div>
        <span class="arrow">&#8250;</span>
      </a>
      <a class="card" href="https://nevergiveup0618.github.io/zeri/">
        <div class="ic">日</div>
        <div class="txt"><div class="t-main">择日学习</div><div class="t-sub">查 · 算 · 学 三模式</div></div>
        <span class="arrow">&#8250;</span>
      </a>
      <a class="card" href="https://nevergiveup0618.github.io/yangong-beisong/">
        <div class="ic">山</div>
        <div class="txt"><div class="t-main">杨公背诵</div><div class="t-sub">五书口诀 · 易学图谱</div></div>
        <span class="arrow">&#8250;</span>
      </a>
    </main>

    <div class="foot">五 术 一 门 &nbsp;·&nbsp; 可 添 加 到 手 机 主 屏</div>
  </div>

<script>
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(function(){}); }
</script>
</body>
</html>
