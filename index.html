<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a1410">
<title>命理学习 · 导航</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#9775;</text></svg>">
<style>
  :root{
    --bg:#161210; --card:#26201a; --card2:#2e261e;
    --gold:#c8a86a; --gold-soft:#e0c690;
    --ink:#efe6d6; --ink-dim:#a99d88;
    --line:rgba(200,168,106,.22);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:radial-gradient(120% 80% at 50% -10%, #2a2018 0%, var(--bg) 55%), var(--bg);
    color:var(--ink);
    font-family:"PingFang SC","Noto Serif SC","Songti SC",serif;
    display:flex; flex-direction:column; align-items:center;
    padding:calc(env(safe-area-inset-top) + 38px) 20px calc(env(safe-area-inset-bottom) + 36px);
  }
  .head{text-align:center; margin-bottom:34px;}
  .glyph{font-size:46px; line-height:1; color:var(--gold); text-shadow:0 0 26px rgba(200,168,106,.35);}
  h1{font-size:23px; letter-spacing:.32em; font-weight:600; margin:16px 0 8px; color:var(--gold-soft); padding-left:.32em;}
  .sub{font-size:13px; letter-spacing:.18em; color:var(--ink-dim); margin:0;}
  .grid{width:100%; max-width:440px; display:flex; flex-direction:column; gap:14px;}
  .card{
    display:flex; align-items:center; gap:16px; padding:18px 20px;
    background:linear-gradient(135deg, var(--card2), var(--card));
    border:1px solid var(--line); border-radius:16px;
    color:var(--ink); text-decoration:none; position:relative; overflow:hidden;
    transition:transform .14s ease, border-color .2s, box-shadow .2s;
    box-shadow:0 2px 10px rgba(0,0,0,.28);
  }
  .card:active{transform:scale(.975);}
  .card:hover{border-color:rgba(200,168,106,.55); box-shadow:0 6px 22px rgba(0,0,0,.4);}
  .card::before{content:""; position:absolute; left:0; top:0; bottom:0; width:4px; background:linear-gradient(var(--gold-soft),var(--gold)); opacity:.85;}
  .ic{flex:0 0 52px; height:52px; border-radius:13px; display:grid; place-items:center; font-size:26px; background:radial-gradient(circle at 35% 30%, #3a2f22, #241d16); border:1px solid var(--line); color:var(--gold-soft);}
  .txt{flex:1; min-width:0;}
  .t-main{font-size:18px; font-weight:600; letter-spacing:.08em; color:var(--ink);}
  .t-sub{font-size:12.5px; color:var(--ink-dim); margin-top:3px; letter-spacing:.04em;}
  .arrow{color:var(--gold); font-size:20px; opacity:.6; flex:0 0 auto;}
  .foot{margin-top:36px; font-size:11.5px; letter-spacing:.14em; color:rgba(169,157,136,.55); text-align:center;}
  @media (min-width:600px){ .grid{max-width:520px;} }
</style>
</head>
<body>
  <div class="head">
    <div class="glyph">&#9775;</div>
    <h1>命理学习</h1>
    <p class="sub">五 术 一 门 · 择 术 而 入</p>
  </div>

  <main class="grid">
    <a class="card" href="https://nevergiveup0618.github.io/bazi-game/">
      <div class="ic">卦</div>
      <div class="txt"><div class="t-main">八字日练</div><div class="t-sub">五模式练习 · 学习计划系统</div></div>
      <span class="arrow">&#8250;</span>
    </a>
    <a class="card" href="https://nevergiveup0618.github.io/bazi-xiangfa/">
      <div class="ic">象</div>
      <div class="txt"><div class="t-main">八字象义</div><div class="t-sub">象义图谱 · 查共象 · 刷卡</div></div>
      <span class="arrow">&#8250;</span>
    </a>
    <a class="card" href="https://nevergiveup0618.github.io/liuren-game/">
      <div class="ic">壬</div>
      <div class="txt"><div class="t-main">大六壬</div><div class="t-sub">起课 · 九宗门 · 毕法速查</div></div>
      <span class="arrow">&#8250;</span>
    </a>
    <a class="card" href="https://nevergiveup0618.github.io/zeri/">
      <div class="ic">日</div>
      <div class="txt"><div class="t-main">择日学习</div><div class="t-sub">查 · 算 · 学 三模式</div></div>
      <span class="arrow">&#8250;</span>
    </a>
    <a class="card" href="https://nevergiveup0618.github.io/yangong-beisong/">
      <div class="ic">山</div>
      <div class="txt"><div class="t-main">杨公背诵</div><div class="t-sub">五书口诀 · 易学图谱</div></div>
      <span class="arrow">&#8250;</span>
    </a>
  </main>

  <div class="foot">点击任一模块进入 · 可添加到手机主屏</div>

<script>
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(function(){}); }
</script>
</body>
</html>
