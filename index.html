<style>
  :root{
    --bg0:#05070f; --bg1:#0a1020;
    --gold:#d9b877; --gold-hi:#f4e6be; --gold-lo:#9a7d43;
    --cyan:#8fd3e0; --cyan-dim:#4d7b88;
    --ink:#e9edf8; --ink-dim:#8a94ac;
    --line:rgba(217,184,119,.26);
    --panel:rgba(14,20,36,.55);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh; position:relative; overflow-x:hidden;
    background:
      radial-gradient(90% 55% at 22% 12%, rgba(80,120,160,.16), transparent 60%),
      radial-gradient(80% 55% at 82% 30%, rgba(110,86,160,.14), transparent 60%),
      radial-gradient(120% 90% at 50% 8%, #101a30 0%, #0a1020 42%, var(--bg0) 100%);
    color:var(--ink);
    font-family:"Noto Serif SC","Songti SC","PingFang SC",serif;
    display:flex; flex-direction:column; align-items:center;
    padding:calc(env(safe-area-inset-top) + 44px) 22px calc(env(safe-area-inset-bottom) + 42px);
  }
  /* 星空层 */
  #stars,#stars2{position:fixed; inset:0; z-index:0; pointer-events:none;}
  .star{position:absolute; border-radius:50%; background:#dfe8ff;}
  @keyframes tw{0%,100%{opacity:.25}50%{opacity:1}}
  .wrap{position:relative; z-index:2; width:100%; display:flex; flex-direction:column; align-items:center;}

  /* 罗盘主视觉 */
  .hero{position:relative; width:210px; height:210px; margin:6px 0 6px; opacity:0; animation:fade 1s .1s ease forwards;}
  .compass{position:absolute; inset:0; color:var(--gold);}
  .compass.spin{animation:spin 120s linear infinite;}
  .compass.spin-r{animation:spin 90s linear infinite reverse;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .core{
    position:absolute; inset:0; display:grid; place-items:center; flex-direction:column;
  }
  .core .tj{font-size:34px; color:var(--gold-hi); text-shadow:0 0 18px rgba(217,184,119,.6); line-height:1;}
  .glow{position:absolute; inset:-30% ; border-radius:50%;
    background:radial-gradient(circle, rgba(217,184,119,.14), transparent 62%); z-index:-1;}

  /* 标题 */
  .head{text-align:center; margin:10px 0 34px; opacity:0; animation:fade 1s .35s ease forwards;}
  h1{
    font-size:33px; letter-spacing:.46em; font-weight:700; margin:0 0 12px; padding-left:.46em;
    background:linear-gradient(100deg,var(--gold-lo),var(--gold-hi) 42%,#fff8e6 50%,var(--gold-hi) 58%,var(--gold-lo));
    background-size:220% 100%;
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    animation:sheen 7s ease-in-out infinite;
  }
  @keyframes sheen{0%,100%{background-position:0 0}50%{background-position:100% 0}}
  .sub{display:flex; align-items:center; justify-content:center; gap:13px;
    font-size:12px; letter-spacing:.4em; color:var(--cyan); opacity:.85; margin:0; padding-left:.4em;}
  .sub::before,.sub::after{content:""; width:30px; height:1px; background:linear-gradient(90deg,transparent,var(--cyan-dim),transparent);}

  /* 卡片 */
  .grid{width:100%; max-width:452px; display:flex; flex-direction:column; gap:14px;}
  .card{
    display:flex; align-items:center; gap:16px; padding:17px 19px;
    background:var(--panel);
    -webkit-backdrop-filter:blur(14px); backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,.07); border-radius:16px;
    color:var(--ink); text-decoration:none; position:relative; overflow:hidden;
    box-shadow:0 6px 26px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.05);
    opacity:0; transform:translateY(16px); animation:rise .7s ease forwards;
    transition:transform .2s ease, border-color .25s, box-shadow .25s;
  }
  .card::before{content:""; position:absolute; left:0; top:0; bottom:0; width:3px;
    background:linear-gradient(var(--cyan),var(--gold)); opacity:.9;}
  .card:nth-child(1){animation-delay:.5s}.card:nth-child(2){animation-delay:.58s}
  .card:nth-child(3){animation-delay:.66s}.card:nth-child(4){animation-delay:.74s}
  .card:nth-child(5){animation-delay:.82s}
  .card:active{transform:scale(.985);}
  .card:hover{border-color:rgba(217,184,119,.5);
    box-shadow:0 12px 38px rgba(0,0,0,.55), 0 0 0 1px rgba(217,184,119,.14);
    transform:translateY(-2px);}
  .ic{
    flex:0 0 50px; height:50px; border-radius:12px; display:grid; place-items:center;
    font-size:24px; font-weight:600; color:var(--gold-hi);
    background:radial-gradient(circle at 32% 26%, #1c2740, #0c1322);
    border:1px solid var(--line);
    box-shadow:inset 0 -3px 8px rgba(0,0,0,.4);
  }
  .txt{flex:1; min-width:0;}
  .t-main{font-size:18px; font-weight:600; letter-spacing:.1em;}
  .t-sub{font-size:12px; color:var(--ink-dim); margin-top:4px; letter-spacing:.04em;}
  .no{font:600 12px/1 "PingFang SC",sans-serif; color:var(--cyan-dim); letter-spacing:.1em; flex:0 0 auto;}
  .arrow{color:var(--gold); font-size:21px; opacity:.5; flex:0 0 auto; transition:transform .2s,opacity .2s;}
  .card:hover .arrow{opacity:1; transform:translateX(3px);}

  /* 学习看板徽标 */
  .badge{
    display:none; margin-top:6px; font:500 11.5px/1.5 "PingFang SC",sans-serif;
    color:#8fd3e0; letter-spacing:.03em;
  }
  .badge.on{display:block;}
  .badge b{color:var(--gold-hi); font-weight:600;}
  /* 继续上次 */
  .cont{
    display:none; align-items:center; gap:8px; margin:-16px 0 26px;
    padding:9px 16px 9px 13px; border-radius:22px; text-decoration:none;
    background:rgba(217,184,119,.1); border:1px solid rgba(217,184,119,.32);
    color:var(--gold-hi); font-size:13px; letter-spacing:.06em;
    opacity:0; animation:fade .8s .45s ease forwards;
  }
  .cont.on{display:inline-flex;}
  .cont:active{background:rgba(217,184,119,.2);}
  .cont .k{font-size:11px; color:var(--ink-dim); letter-spacing:.1em;}
  /* 今日功课：先告诉用户今天做什么，再进入各学习模块 */
  .daily{
    width:100%; max-width:452px; margin:0 0 18px; padding:18px;
    border:1px solid rgba(217,184,119,.3); border-radius:18px;
    background:linear-gradient(145deg,rgba(25,34,55,.88),rgba(11,17,31,.78));
    box-shadow:0 10px 34px rgba(0,0,0,.38),inset 0 1px 0 rgba(255,255,255,.05);
    opacity:0; animation:rise .7s .46s ease forwards;
  }
  .daily-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px;}
  .daily-kicker{font:600 11px/1 "PingFang SC",sans-serif;color:var(--cyan);letter-spacing:.18em;margin-bottom:7px;}
  .daily-title{font-size:21px;font-weight:650;letter-spacing:.08em;color:var(--gold-hi);}
  .daily-date{font:500 11px/1.5 "PingFang SC",sans-serif;color:var(--ink-dim);white-space:nowrap;text-align:right;}
  .daily-progress{height:4px;background:rgba(255,255,255,.07);border-radius:9px;overflow:hidden;margin-bottom:15px;}
  .daily-progress i{display:block;width:0;height:100%;border-radius:9px;background:linear-gradient(90deg,var(--cyan),var(--gold));transition:width .35s ease;}
  .task{display:grid;grid-template-columns:38px 1fr auto;align-items:center;gap:11px;padding:12px 0;border-top:1px solid rgba(255,255,255,.07);}
  .task.off{display:none;}
  .task>div{min-width:0;}
  .task:first-of-type{border-top:0;padding-top:0;}
  .task:last-of-type{padding-bottom:0;}
  .task-check{width:34px;height:34px;border-radius:50%;border:1px solid rgba(143,211,224,.45);background:rgba(143,211,224,.07);color:transparent;font-size:17px;cursor:pointer;}
  .task-check.done{color:#08111b;background:var(--cyan);border-color:var(--cyan);}
  .task-name{font-size:15px;font-weight:600;letter-spacing:.05em;}
  .task-topic{margin-top:4px;font:600 12px/1.5 "PingFang SC",sans-serif;color:var(--cyan);}
  .task-desc{margin-top:2px;font:400 11.5px/1.55 "PingFang SC",sans-serif;color:var(--ink-dim);}
  .task-go{padding:8px 11px;border:1px solid rgba(217,184,119,.35);border-radius:10px;color:var(--gold-hi);text-decoration:none;font:500 12px/1 "PingFang SC",sans-serif;white-space:nowrap;background:rgba(217,184,119,.08);}
  .task.done .task-name,.task.done .task-desc{opacity:.48;text-decoration:line-through;}
  .daily-note{margin-top:14px;text-align:center;font:500 11.5px/1.5 "PingFang SC",sans-serif;color:var(--ink-dim);letter-spacing:.03em;}
  .foot{margin-top:40px; font-size:10.5px; letter-spacing:.24em; color:rgba(138,148,172,.5); text-align:center;
    opacity:0; animation:fade 1s 1s ease forwards;}
  @keyframes fade{to{opacity:1;}}
  @keyframes rise{to{opacity:1; transform:none;}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;} .hero,.head,.daily,.card,.foot{opacity:1;transform:none;}}
  @media (max-width:360px){.daily{padding:15px}.task{grid-template-columns:34px 1fr;gap:9px}.task-go{grid-column:2;justify-self:start;margin-top:-2px}.task-check{width:32px;height:32px}}
  @media (min-width:600px){ .grid,.daily{max-width:540px;} .hero{width:240px;height:240px;} }
</style>

<script>
// —— 星空 ——
(function(){
  function field(el,n,maxr,tw){
    var h="";
    for(var i=0;i<n;i++){
      var s=(Math.random()*maxr+0.4).toFixed(2);
      var x=(Math.random()*100).toFixed(2), y=(Math.random()*100).toFixed(2);
      var o=(Math.random()*0.6+0.2).toFixed(2);
      var t=tw?(" animation:tw "+(Math.random()*4+2.5).toFixed(1)+"s ease-in-out "+(Math.random()*4).toFixed(1)+"s infinite;"):"";
      h+='<span class="star" style="width:'+s+'px;height:'+s+'px;left:'+x+'%;top:'+y+'%;opacity:'+o+';'+t+'"></span>';
    }
    el.innerHTML=h;
  }
  field(document.getElementById('stars'),90,1.6,true);
  field(document.getElementById('stars2'),50,1.0,false);
})();

// —— 罗盘 ——
(function(){
  var NS="http://www.w3.org/2000/svg", C=100;
  function pt(cx,cy,r,deg){var a=(deg-90)*Math.PI/180;return[cx+r*Math.cos(a),cy+r*Math.sin(a)];}
  // 外环:24山刻度 + 双圈
  var out='';
  out+='<circle cx="100" cy="100" r="94" stroke="currentColor" stroke-opacity=".55" stroke-width="1"/>';
  out+='<circle cx="100" cy="100" r="80" stroke="currentColor" stroke-opacity=".3" stroke-width="1"/>';
  for(var i=0;i<24;i++){
    var deg=i*15, major=(i%3===0);
    var r1=94, r2=major?80:86;
    var a=(deg-90)*Math.PI/180;
    out+='<line x1="'+(100+r1*Math.cos(a)).toFixed(1)+'" y1="'+(100+r1*Math.sin(a)).toFixed(1)+'" x2="'+(100+r2*Math.cos(a)).toFixed(1)+'" y2="'+(100+r2*Math.sin(a)).toFixed(1)+'" stroke="currentColor" stroke-opacity="'+(major?'.85':'.4')+'" stroke-width="'+(major?1.4:0.8)+'"/>';
  }
  document.getElementById('ring-out').innerHTML=out;
  // 内环:八卦 + 圈
  var trig=['☰','☱','☲','☳','☴','☵','☶','☷'];
  var inn='';
  inn+='<circle cx="100" cy="100" r="64" stroke="#8fd3e0" stroke-opacity=".35" stroke-width="1"/>';
  inn+='<circle cx="100" cy="100" r="44" stroke="currentColor" stroke-opacity=".35" stroke-width="1"/>';
  for(var k=0;k<8;k++){
    var d=k*45, a2=(d-90)*Math.PI/180, rr=54;
    var x=(100+rr*Math.cos(a2)), y=(100+rr*Math.sin(a2));
    inn+='<text x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" fill="#8fd3e0" fill-opacity=".8" font-size="11" text-anchor="middle" dominant-baseline="central">'+trig[k]+'</text>';
  }
  document.getElementById('ring-in').innerHTML=inn;
})();

      ['《三百六十形穴歌》','原文精读 1 节 → 闪卡 12 段 → 复习“不熟”卡 → 画面联想'],
      ['口诀专题','专题精读 5 条 → 挖空练习 10 条 → 复习“不熟”口诀 → 默写 2 条'],
      ['易学图谱','复习先后天八卦 → 六十四卦分组速查 → 口诀随机 10 条 → 周复盘']
    ]
  };
  document.getElementById('course-day').textContent=courseDay;
  var subjectIds=['xiangfa','zeri','yangong'];
  var ACTIONS={
    xiangfa:'精读 1 条 → 闪卡 3 题 → 查共象或排盘验证 1 次',
    zeri:'精读 1 个知识点 → 做 3 道题 → 回看 1 道错题',
    yangong:'精读 3 段 → 闪卡背诵 3 段 → 复习 2 段“不熟”内容'
  };
  var subjectLesson=courseDay-1;
  subjectIds.forEach(function(id){
    var row=document.querySelector('.task[data-task="'+id+'"]'), list=LESSONS[id], lesson=list[subjectLesson%list.length];
    row.querySelector('.task-topic').textContent='本课主题：'+lesson[0];
    row.querySelector('.task-desc').textContent=ACTIONS[id];
    row.classList.remove('off');
  });
  var d=new Date(), week=['日','一','二','三','四','五','六'];
  document.getElementById('daily-date').innerHTML=(d.getMonth()+1)+'月'+d.getDate()+'日<br>星期'+week[d.getDay()];
  var key='wst_daily_'+td+'_lesson_'+courseDay, done={};
  try{done=JSON.parse(localStorage.getItem(key)||'{}');}catch(e){done={};}
  var tasks=[].slice.call(document.querySelectorAll('.task'));
  function draw(){
    var n=0, total=tasks.length;
    tasks.forEach(function(row){
      var id=row.getAttribute('data-task'), on=!!done[id];
      row.classList.toggle('done',on); row.querySelector('.task-check').classList.toggle('done',on);
      row.querySelector('.task-check').setAttribute('aria-pressed',on?'true':'false');
      if(on)n++;
    });
    document.getElementById('daily-count').textContent=n+'/'+total;
    document.getElementById('daily-bar').style.width=(n/total*100)+'%';
    document.getElementById('daily-note').textContent=n===total?'第 '+courseDay+' 课已完成，下个学习日进入第 '+(courseDay%42+1)+' 课。':n>0?'已完成 '+n+' 个网站，还剩 '+(total-n)+' 个。':'三个网站各学一点，总计约 15–30 分钟。';
    try{
      if(n===total){localStorage.setItem('wst_course_complete',td);lastComplete=td;}
      else if(lastComplete===td){localStorage.removeItem('wst_course_complete');lastComplete='';}
    }catch(e){}
  }
  tasks.forEach(function(row){
    row.querySelector('.task-check').addEventListener('click',function(){
      var id=row.getAttribute('data-task'); done[id]=!done[id];
      try{localStorage.setItem(key,JSON.stringify(done));}catch(e){}
      draw();
    });
  });
  draw();
})();

// —— 学习看板 + 继续上次 + 按使用频率排序 ——
// 同域共享 localStorage,直接读各App的真实存储键
(function(){
  var NAMES={bazi:'八字日练',xiangfa:'八字象义',liuren:'大六壬',zeri:'择日学习',yangong:'杨公背诵'};
  function J(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
  function today(){return new Date().toISOString().slice(0,10);}

  var STAT={
    // bazi_cat_stats: {类目:{a:答题数, e:错数}}  ——与 updateCatStats() 一致
    bazi:function(){
      var s=J('bazi_cat_stats',{}),a=0,e=0;
      for(var k in s){ var v=s[k]||{}; a+=+v.a||0; e+=+v.e||0; }
      return a ? '已练 <b>'+a+'</b> 题 · 正确率 <b>'+Math.round((a-e)/a*100)+'%</b>' : null;
    },
    // lr_weak: {类目:{q:出题, w:错}} ——与 getWeakSpot() 一致:只看 q>=5,取错误率最高
    liuren:function(){
      var d=J('lr_weak',{}),best=null,br=-1;
      for(var k in d){
        var v=d[k]||{}, q=+v.q||0, w=+v.w||0;
        if(q>=5){ var r=w/q; if(r>br){ br=r; best=k; } }
      }
      return (best&&br>0) ? '薄弱:<b>'+best+'</b> · 错误率 <b>'+Math.round(br*100)+'%</b>' : null;
    },
    // zeri_wrong_v1: 错题Set; zeri_streak_v1: {last,days}
    // 注意:择日的日期格式不补零(2026-7-13);days是存量,断签不会清零 → 需自行判定是否仍连续
    zeri:function(){
      var w=J('zeri_wrong_v1',[]),st=J('zeri_streak_v1',{}),p=[];
      if(Array.isArray(w)&&w.length) p.push('错题 <b>'+w.length+'</b>');
      function ds(t){ return t.getFullYear()+'-'+(t.getMonth()+1)+'-'+t.getDate(); }
      var td=ds(new Date()), yd=ds(new Date(Date.now()-864e5));
      if(st && +st.days>0 && (st.last===td || st.last===yd)) p.push('连续 <b>'+st.days+'</b> 天');
      return p.length ? p.join(' · ') : null;
    },
    // yangpu: {书:{date, seen, known}} ——与App一致:今日已背=seen,记住=known(日期为ISO)
    yangong:function(){
      var s=J('yangpu',{}),t=today(),seen=0,known=0;
      for(var k in s){ var v=s[k]||{}; if(v && v.date===t){ seen+=+v.seen||0; known+=+v.known||0; } }
      return seen ? '今日已背 <b>'+seen+'</b> · 记住 <b>'+known+'</b>' : null;
    },
    // 象义:键名动态(前缀 bazi_xiangyi_mobile_v2__),只能确认有无记录
    xiangfa:function(){
      var pre='bazi_xiangyi_mobile_v2__',c=0;
      try{ for(var i=0;i<localStorage.length;i++){ if((localStorage.key(i)||'').indexOf(pre)===0) c++; } }
      catch(e){ return null; }
      return c ? '已有学习记录' : null;
    }
  };

  var cards=[].slice.call(document.querySelectorAll('.card'));
  cards.forEach(function(c){
    var f=STAT[c.getAttribute('data-app')]; if(!f) return;
    var t=null; try{ t=f(); }catch(e){ t=null; }   // 读不到就不显示,绝不显示错数字
    if(t){ var b=c.querySelector('.badge'); b.innerHTML=t; b.className='badge on'; }
  });

  // 按使用频率排序(常用的排前面,未用过的保持原序)
  var usage=J('wst_usage',{}), grid=document.getElementById('grid');
  var sorted=cards.slice().sort(function(a,b){
    var ua=+usage[a.getAttribute('data-app')]||0, ub=+usage[b.getAttribute('data-app')]||0;
    return ub!==ua ? ub-ua : cards.indexOf(a)-cards.indexOf(b);
  });
  sorted.forEach(function(c){ grid.appendChild(c); });

  // 继续上次
  var last=null; try{ last=localStorage.getItem('wst_last'); }catch(e){}
  if(last && NAMES[last]){
    var el=document.getElementById('cont');
    document.getElementById('cont-name').textContent=NAMES[last];
    el.href='view.html?app='+last;
    el.className='cont on';
  }
})();

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').then(function(reg){ reg.update(); }).catch(function(){});
  var _refreshed=false;
  navigator.serviceWorker.addEventListener('controllerchange', function(){
    if(_refreshed) return; _refreshed=true; location.reload();
  });
}
</script>
</body>
